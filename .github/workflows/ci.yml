name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: nutriroll
          POSTGRES_PASSWORD: nutriroll
          POSTGRES_DB: nutriroll
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nutriroll -d nutriroll"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NUTRIROLL_DATABASE_URL: postgresql+asyncpg://nutriroll:nutriroll@localhost:5432/nutriroll
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Setup Python
        run: uv python install 3.13
      - name: Install deps
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run pyright
      - name: Test
        run: uv run pytest

  web:
    name: web (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  e2e:
    name: e2e (Playwright vs docker compose)
    runs-on: ubuntu-latest
    needs: [server, web]
    steps:
      - uses: actions/checkout@v4
      - name: Boot stack
        run: docker compose up -d --build
      - name: Wait for backend
        run: |
          for _ in {1..60}; do
            if curl -sf http://localhost:8000/healthz; then exit 0; fi
            sleep 2
          done
          echo "backend never became healthy" >&2
          docker compose logs
          exit 1
      - name: Wait for frontend
        run: |
          for _ in {1..60}; do
            if curl -sf http://localhost:3000 >/dev/null; then exit 0; fi
            sleep 2
          done
          echo "frontend never became reachable" >&2
          docker compose logs
          exit 1
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install Playwright deps
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Run e2e
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: pnpm e2e
      - name: Tear down
        if: always()
        run: docker compose down -v
