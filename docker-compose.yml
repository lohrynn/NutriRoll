# Local dev stack: Postgres 17 + FastAPI (uvicorn --reload) + Next.js dev server.
# One `make dev` brings it all up.

name: nutriroll

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutriroll
      POSTGRES_PASSWORD: nutriroll
      POSTGRES_DB: nutriroll
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriroll -d nutriroll"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    command: uv run uvicorn nutriroll.api.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      NUTRIROLL_DATABASE_URL: postgresql+asyncpg://nutriroll:nutriroll@postgres:5432/nutriroll
      NUTRIROLL_ENV: dev
      NUTRIROLL_LOG_LEVEL: INFO
      NUTRIROLL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - server_uv_cache:/root/.cache/uv
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    command: pnpm dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_PWA_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  server_uv_cache:
  web_node_modules:
